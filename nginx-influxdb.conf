upstream influxdb_backend {
    server influxdb:8086;
    keepalive 32;
}

server {
    listen 8087;

    # Increase timeouts for Flux queries
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Force HTTP/1.1 to backend, keep-alive to client
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # Disable buffering so streaming responses flow through immediately
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://influxdb_backend;
    }
}
