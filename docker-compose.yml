version: "3.8"

services:
  # --------------------------------------------------------------------------
  # InfluxDB 2.x (OSS)
  # --------------------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: spring_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: spring_factory
      DOCKER_INFLUXDB_INIT_BUCKET: spring_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: spring_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-influxdb-flux-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Pulse Simulator (our Python app)
  # --------------------------------------------------------------------------
  pulse_simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring_pulse_simulator
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-super-secret-token
      INFLUXDB_ORG: spring_factory
      INFLUXDB_BUCKET: spring_data
      # -- Tuning parameters (all in seconds) --
      INTRA_PULSE_GAP: "0.05"         # 50 ms between pulses within a product
      INTRA_PULSE_JITTER: "0.008"     # ±8 ms random jitter
      INTER_SERIES_GAP: "0.5"         # 500 ms between products
      INTER_SERIES_JITTER: "0.08"     # ±80 ms random jitter
      PULSES_PER_PRODUCT_MIN: "8"     # min pulses per product
      PULSES_PER_PRODUCT_MAX: "15"    # max pulses per product
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
