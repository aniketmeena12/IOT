apiVersion: 1

providers:
  - name: "Production Machine Dashboards"
    orgId: 1
    folder: "Production Machine"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
