apiVersion: 1

datasources:
  - name: InfluxDB-Flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    uid: influxdb-uid
    jsonData:
      version: Flux
      organization: spring_factory
      defaultBucket: spring_data
      tlsSkipVerify: true
    secureJsonData:
      token: my-super-secret-token
    isDefault: true
    editable: true
