# =============================================================================
# docker-compose.cloud.yml
# Use this instead of docker-compose.yml when using Grafana Cloud.
# Runs ONLY InfluxDB + Pulse Simulator (no local Grafana).
#
# Usage:
#   docker-compose -f docker-compose.cloud.yml up -d
# =============================================================================
version: "3.8"

services:
  # --------------------------------------------------------------------------
  # InfluxDB 2.x (OSS)
  # --------------------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: spring_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: spring_factory
      DOCKER_INFLUXDB_INIT_BUCKET: spring_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    dns_search: []
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Nginx reverse proxy (stabilises connections from Grafana Cloud)
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: spring_nginx
    ports:
      - "8087:8087"
    volumes:
      - ./nginx-influxdb.conf:/etc/nginx/conf.d/default.conf:ro
    dns_search: []
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Heating Simulator
  # --------------------------------------------------------------------------
  heating_simulator:
    build:
      context: .
      dockerfile: Dockerfile.heating
    container_name: spring_heating_simulator
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-super-secret-token
      INFLUXDB_ORG: spring_factory
      INFLUXDB_BUCKET: spring_data
      MACHINE_NAME: smart_heater_01
    dns_search: []
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Pulse Simulator (our Python app)
  # --------------------------------------------------------------------------
  pulse_simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring_pulse_simulator
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-super-secret-token
      INFLUXDB_ORG: spring_factory
      INFLUXDB_BUCKET: spring_data
      INTRA_PULSE_GAP: "0.05"
      INTRA_PULSE_JITTER: "0.008"
      INTER_SERIES_GAP: "0.5"
      INTER_SERIES_JITTER: "0.08"
      PULSES_PER_PRODUCT_MIN: "8"
      PULSES_PER_PRODUCT_MAX: "15"
    dns_search: []
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
